<!DOCTYPE html>
<html>
<head>
    <title>Minha Página</title>
<style>
    .grid-container {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        max-width: 1000px; /* Evita que o grid fique gigante em telas ultra-wide */
        margin: 0 auto;    /* Centraliza o grid na tela */
    }
    .grid-item {
        border: 1px solid #ccc;
        border-radius: 8px; /* Um toque de design moderno */
        overflow: hidden;
    }
      .grid-item img {
        width: 100%;
        height: 250px; 
        object-fit: cover;
        display: block;
    }
    /* 
       NOTE: I used 'object-fit: cover' and a fixed height to prevent image 
       distortion and ensure the grid remains fully visible on 13" laptop 
       screens (MacBook Air) without excessive scrolling.
    */

</style>
</head>
<body>
     <p> Meu primeiro parágrafo!</p>
    <button>  Clique Aqui </button>
    <input>
    <input type="checkbox">
    <div class="grid-container">
        <div class="grid-item">
            <img src="https://yt3.googleusercontent.com/-4CLzsHhS6p7BRUke_xHm7RJCDQxqBwAXD9VSbvljMqopbBvoiq1floAVRu_rV5tulnfpBcdiw=s900-c-k-c0x00ffffff-no-rj" alt="Imagem 1">
        </div>
        <div class="grid-item">
            <img src="https://vehicle-images.dealerinspire.com/4c55-110007084/thumbnails/large/SCFSMGFW2SGN09083/a0be35e6f5788c57b4f4fe97cf5a5bc9.jpg" alt="Imagem 2">
        </div>
        <div class="grid-item">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRDFlD8YHyyoZc3Av2Iob76tnbkx1BuYzWNzg&s" alt="Imagem 3">
        </div>
        <div class="grid-item">
            <img src="https://militarywatchmagazine.com/m/articles/2021/09/21/article_614a4d2b6d9481_96794162.jpeg" alt="Imagem 4">
        </div>
    </div><!-- Conteúdo do seu HTML aqui -->
</body>
</html>
