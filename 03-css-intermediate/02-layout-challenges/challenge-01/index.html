<!-- No HTML semântico, a principal diferença entre as tags reside no seu significado e propósito. Tags semânticas, como <header>, <footer>, <article>, <div> e <span>, descrevem o conteúdo que envolvem, enquanto tags não semânticas, como <div> e <span>, são usadas principalmente para fins de estilo e layout, sem transmitir informações sobre o conteúdo em si. 
Tags Semânticas:
Definem o conteúdo:
Indicam o tipo de informação contida dentro delas. Por exemplo, <header> define o cabeçalho de uma seção, <footer> o rodapé, e <article> um conteúdo independente. 
Melhoram a acessibilidade:
Facilitam a compreensão do conteúdo por leitores de tela e outros dispositivos de acessibilidade. 
Otimizam o SEO:
Ajuda os mecanismos de busca a entenderem a estrutura e o conteúdo de um site, o que pode melhorar o posicionamento nos resultados de pesquisa. 
Exemplos:
<article>, <aside>, <nav>, <section>, <h1> a <h6>, <strong>, <em>, <ul>, <ol>, <li>. 
Tags Não Semânticas:
Usadas para layout e estilo: Principalmente para criar divisões visuais e aplicar formatação, sem significado inerente ao conteúdo. 
Podem causar problemas de acessibilidade: O uso excessivo de tags como <div> sem significado pode dificultar a compreensão do conteúdo por leitores de tela. 
Podem tornar o código menos organizado: O excesso de <div> pode dificultar a leitura e manutenção do código. 
Exemplos: <div>, <span>. 
Exemplo prático:
Imagine um artigo de blog. Em vez de usar apenas <div> para estruturar todo o conteúdo, o HTML semântico permite o uso de: 
<header> para o cabeçalho do artigo, com título (<h1>) e talvez uma imagem.
<article> para o conteúdo principal do artigo, com parágrafos (<p>), listas (<ul>, <ol>), e imagens (<img>).
<aside> para um conteúdo complementar, como sugestões de leitura.
<footer> para o rodapé do artigo, com informações sobre o autor, data de publicação, etc.
Essa abordagem torna o código mais organizado, acessível e otimizado para mecanismos de busca, em comparação com o uso excessivo de tags <div> sem significado.  -->
